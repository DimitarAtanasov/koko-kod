<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Коко Код Академия</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF6FA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Коко Код">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@500;600;700;800&family=Fira+Code:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#FFD3E4; --pink-deep:#FF6FA5;
    --lavender:#E4D9FF; --lavender-deep:#9B7BFF;
    --mint:#CFF6EA; --mint-deep:#2FB893;
    --peach:#FFE3C4; --peach-deep:#FF9A4D;
    --sky:#D3ECFF; --sky-deep:#4FA1E8;
    --gold:#FFEEB0; --gold-deep:#E3A319;
    --rose:#FFE1EE; --rose-deep:#D6467F;
    --coral:#FFD9C7; --coral-deep:#E8703A;
    --violet:#E6D6FF; --violet-deep:#8B4FE8;
    --amber:#FFE7A0; --amber-deep:#D98A00;
    --indigo:#D6E0FF; --indigo-deep:#5B6EE8;
    --plum:#3E2247; --plum-soft:#6B5476;
    --cream:#FFFAF3;
    --navy:#1B1B3A; --navy2:#242456;
    --yellow:#FFD447; --purple:#8C6BFC; --teal:#4ECDC4;
    --ok:#2FB893; --bad:#FF5D7A;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration:0.01ms !important; animation-iteration-count:1 !important;
      transition-duration:0.01ms !important; scroll-behavior:auto !important;
    }
  }
  :focus-visible{outline:3px solid var(--pink-deep); outline-offset:2px;}
  body{margin:0; background:var(--cream); color:var(--plum); font-family:'Nunito',sans-serif;}
  h1,h2,h3{font-family:'Baloo 2',cursive; margin:0;}
  button{font-family:inherit;}
  .hidden{display:none !important;}

  /* ===== APP SHELL ===== */
  .app-nav{position:sticky; top:0; z-index:80; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:10px 4vw; background:rgba(255,250,243,.95); backdrop-filter:blur(6px); border-bottom:3px solid var(--plum);}
  .app-brand{font-family:'Baloo 2',cursive; font-weight:800; font-size:1.15rem; color:var(--plum); margin-right:auto;}
  .app-user{font-weight:800; font-size:.9rem; background:#fff; border-radius:100px; padding:6px 12px; border:2px solid var(--plum);}
  .app-tabs{display:flex; gap:6px;}
  .app-tab{font-family:'Baloo 2',cursive; font-weight:700; font-size:.88rem; border:2px solid var(--plum); background:#fff;
    color:var(--plum); border-radius:100px; padding:8px 14px; cursor:pointer;}
  .app-tab.active{background:var(--plum); color:#fff;}
  .app-continue{font-family:'Baloo 2',cursive; font-weight:700; font-size:.88rem; border:none; background:var(--pink-deep);
    color:#fff; border-radius:100px; padding:8px 16px; cursor:pointer;}
  .app-settings{border:2px solid var(--plum); background:#fff; border-radius:100px; width:38px; height:38px; cursor:pointer; font-size:1rem;}

  #appRoot{min-height:70vh;}
  .loading-screen{display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:70vh; gap:14px;}
  .loading-screen .spin{font-size:2.4rem; animation:spin 1.2s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  /* ===== ONBOARDING ===== */
  .onboard{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:6vw;
    background:radial-gradient(circle at 20% 20%, var(--lavender) 0%, var(--pink) 45%, var(--sky) 100%);}
  .onboard-card{background:#fff; border-radius:28px; padding:36px; max-width:520px; width:100%; text-align:center;
    border:3px solid var(--plum); box-shadow:8px 8px 0 var(--plum);}
  .onboard-card .mascots{font-size:2.6rem; margin-bottom:6px;}
  .onboard-card h1{font-size:1.6rem; margin-top:6px;}
  .onboard-card p{color:var(--plum-soft); font-weight:600; margin-top:8px;}
  .onboard-card .onboard-motto{font-family:'Baloo 2',cursive; font-weight:700; font-style:italic; color:var(--pink-deep); margin-top:2px; font-size:.95rem;}
  .onboard-input{width:100%; margin-top:20px; padding:12px 16px; border-radius:14px; border:2.5px solid var(--plum);
    font-family:'Baloo 2',cursive; font-size:1.05rem; text-align:center;}
  .track-choice{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:20px;}
  .track-card{border:3px solid var(--plum); border-radius:18px; padding:16px; cursor:pointer; background:#fff; text-align:center;}
  .track-card.selected{background:var(--yellow); }
  .track-card .emoji{font-size:2rem;}
  .track-card h3{font-size:1rem; margin-top:6px;}
  .track-card p{font-size:.8rem; color:var(--plum-soft); margin-top:4px;}

  .interest-head{margin-top:22px; font-weight:800; font-size:.85rem; color:var(--plum-soft);}
  .interest-choice{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; justify-content:center;}
  .interest-chip{border:2.5px solid var(--plum); border-radius:100px; padding:8px 14px; background:#fff; cursor:pointer;
    font-family:'Baloo 2',cursive; font-weight:700; font-size:.85rem; color:var(--plum);}
  .interest-chip.selected{background:var(--lavender-deep); color:#fff; border-color:var(--lavender-deep);}

  .reco-banner{max-width:1000px; margin:0 auto 20px; background:linear-gradient(135deg, var(--lavender), var(--sky));
    border:3px solid var(--plum); border-radius:20px; padding:16px 20px;}
  .reco-banner h4{font-size:.95rem; margin-bottom:6px;}
  .reco-banner .reco-jumps{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .reco-jump-btn{font-family:'Baloo 2',cursive; font-weight:700; font-size:.8rem; border:2px solid var(--plum);
    background:#fff; border-radius:100px; padding:6px 14px; cursor:pointer;}
  .reco-badge{margin-left:4px; font-size:.85rem;}
  .onboard-start{margin-top:22px; width:100%; padding:14px; border:none; border-radius:100px; background:var(--pink-deep);
    color:#fff; font-family:'Baloo 2',cursive; font-weight:700; font-size:1.05rem; cursor:pointer; box-shadow:0 6px 0 #b8365e;}
  .onboard-start:active{transform:translateY(4px); box-shadow:none;}
  .onboard-start:disabled{opacity:.5; cursor:not-allowed;}

  /* ===== SETTINGS PANEL ===== */
  .settings-panel{position:fixed; top:0; right:0; height:100%; width:min(320px,90vw); background:#fff; z-index:100;
    box-shadow:-8px 0 24px rgba(0,0,0,.15); padding:24px; overflow-y:auto;}
  .settings-panel h3{font-size:1.15rem;}
  .settings-panel .close-x{position:absolute; top:16px; right:16px; border:none; background:none; font-size:1.3rem; cursor:pointer;}
  .settings-row{margin-top:20px;}
  .settings-row label{font-weight:800; font-size:.85rem; display:block; margin-bottom:6px;}
  .settings-row input{width:100%; padding:10px; border-radius:10px; border:2px solid var(--plum); font-family:'Baloo 2',cursive;}
  .btn-danger{margin-top:10px; width:100%; padding:10px; border-radius:100px; border:2px solid var(--bad); color:var(--bad);
    background:#fff; font-weight:800; cursor:pointer;}
  .btn-save{margin-top:16px; width:100%; padding:12px; border-radius:100px; border:none; background:var(--ok); color:#fff;
    font-family:'Baloo 2',cursive; font-weight:700; cursor:pointer;}
  .overlay-bg{position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:90;}

  /* ===== DASHBOARD ===== */
  .dash-hero{padding:34px 6vw; background:linear-gradient(135deg, var(--lavender), var(--pink)); text-align:center;}
  .dash-hero h2{font-size:1.5rem;}
  .dash-hero p{color:var(--plum-soft); font-weight:700; margin-top:6px;}
  .progress-cards{display:flex; gap:16px; justify-content:center; margin-top:20px; flex-wrap:wrap;}
  .progress-card{background:#fff; border-radius:18px; padding:16px 22px; border:3px solid var(--plum); min-width:180px;}
  .progress-card .big{font-family:'Baloo 2',cursive; font-size:1.6rem; font-weight:800;}
  .progress-card .lbl{font-size:.8rem; font-weight:700; color:var(--plum-soft);}
  .bar-track{background:#eee; border-radius:100px; height:10px; margin-top:8px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--pink-deep); border-radius:100px; transition:width .3s;}

  section{padding:50px 6vw;}
  .section-head{max-width:640px; margin:0 auto 28px; text-align:center;}
  .kicker{color:var(--pink-deep); font-weight:800; font-size:.8rem; letter-spacing:.07em; text-transform:uppercase;}
  .section-head h2{font-size:clamp(1.4rem,3vw,2rem); margin-top:8px;}
  .section-head p{margin-top:8px; font-size:1rem; color:var(--plum-soft);}

  /* ===== TRACK A (6+) — Robi space theme ===== */
  .robi-hero{position:relative; overflow:hidden; padding:40px 6vw 60px;
    background:radial-gradient(ellipse at 20% 20%, #2b2b63 0%, var(--navy) 55%, var(--navy) 100%); color:var(--cream); border-radius:0 0 32px 32px;}
  .robi-hero h2{font-size:clamp(1.5rem,3.4vw,2.2rem); color:#fff;}
  .robi-hero p{color:#DCDCF5; font-weight:600; margin-top:8px; max-width:52ch;}
  .robi-mascot{font-size:3.4rem; animation:float 3s ease-in-out infinite; text-align:center; margin-top:10px;}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-12px) rotate(3deg);}}

  .a-level-tabs{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:22px; justify-content:center;}
  .a-level-tab{display:flex; align-items:center; gap:6px; font-family:'Baloo 2',cursive; font-weight:700; font-size:.9rem;
    padding:9px 15px; border-radius:100px; border:2.5px solid var(--navy); background:#fff; cursor:pointer; color:var(--navy);}
  .a-level-tab.active{background:var(--navy); color:#fff;}
  .a-level-tab.locked{opacity:.4; cursor:not-allowed;}

  .a-game-panel{max-width:1000px; margin:0 auto; background:#fff; border:3px solid var(--navy); border-radius:26px;
    box-shadow:8px 8px 0 var(--navy); padding:26px; display:grid; grid-template-columns:1fr 1fr; gap:24px;}
  .a-instructions h3{font-size:1.2rem;}
  .a-badge{display:inline-block; background:var(--teal); color:var(--navy); font-weight:800; border-radius:100px;
    padding:4px 12px; font-size:.75rem; margin-bottom:8px;}
  .a-instructions p{color:#4A4A6A; font-size:.96rem; line-height:1.5; margin-top:8px;}
  .a-tip{margin-top:14px; background:#FFF3D6; border-left:5px solid var(--yellow); border-radius:10px; padding:10px 12px;
    font-size:.86rem; color:#6b5300; font-weight:700;}
  .audio-hint-row{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .audio-btn{background:var(--sky-deep); color:#fff; border:none; border-radius:100px; padding:9px 16px;
    font-family:'Baloo 2',cursive; font-weight:700; font-size:.85rem; cursor:pointer; box-shadow:0 4px 0 #3576b0; display:flex; align-items:center; gap:6px;}
  .audio-btn:active{transform:translateY(3px); box-shadow:none;}
  .hint-btn{background:#fff; color:var(--gold-deep); border:2px solid var(--gold-deep); border-radius:100px; padding:8px 16px;
    font-family:'Baloo 2',cursive; font-weight:700; font-size:.85rem; cursor:pointer;}
  .hint-box{margin-top:10px; background:#FFF3D6; border-left:5px solid var(--gold-deep); border-radius:10px; padding:10px 12px;
    font-size:.9rem; color:#6b5300; font-weight:800;}
  .a-cmd-palette{display:flex; gap:8px; flex-wrap:wrap; margin-top:18px;}
  .a-cmd-btn{font-size:1.4rem; background:var(--purple); color:#fff; border:none; border-radius:14px; width:52px; height:52px;
    cursor:pointer; box-shadow:0 4px 0 #5c3fd6;}
  .a-cmd-btn:active{transform:translateY(4px); box-shadow:none;}
  .a-mult-row{display:flex; gap:6px; margin-top:10px; align-items:center; flex-wrap:wrap;}
  .a-mult-row span{font-weight:800; font-size:.8rem; color:#4A4A6A;}
  .a-mult-btn{font-family:'Baloo 2',cursive; font-weight:700; border:2px solid var(--navy); background:#fff; border-radius:10px;
    width:34px; height:34px; cursor:pointer; font-size:.85rem;}
  .a-mult-btn.active{background:var(--yellow);}
  .a-program{margin-top:14px; min-height:50px; background:#F4F1FF; border-radius:14px; padding:8px; display:flex;
    gap:6px; flex-wrap:wrap; align-items:center; border:2px dashed #C9BFFF;}
  .a-chip{background:#fff; border:2px solid var(--purple); border-radius:10px; padding:5px 8px; font-weight:800;
    font-size:.88rem; cursor:pointer;}
  .a-empty-hint{color:#9993c9; font-weight:700; font-size:.85rem;}
  .a-action-row{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;}
  .a-btn-run{background:var(--ok); color:#fff; font-family:'Baloo 2',cursive; font-weight:700; border:none; border-radius:100px;
    padding:11px 22px; cursor:pointer; box-shadow:0 5px 0 #1c8064;}
  .a-btn-run:active{transform:translateY(4px); box-shadow:none;}
  .a-btn-clear{background:#fff; color:var(--bad); font-family:'Baloo 2',cursive; font-weight:700; border:2px solid var(--bad);
    border-radius:100px; padding:11px 18px; cursor:pointer;}
  .a-grid-stage{position:relative; background:#0F0F2E; border-radius:18px; padding:10px; display:grid; gap:4px; margin:0 auto;}
  .a-cell{width:46px; height:46px; border-radius:8px; background:#232357; display:flex; align-items:center; justify-content:center; font-size:1.35rem;}
  .a-cell.wall{background:#42406b;} .a-cell.goal{background:#3a3560;}
  .a-robot-token{position:absolute; width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    font-size:1.7rem; transition:left .3s ease, top .3s ease; pointer-events:none;}
  .a-message{margin-top:14px; min-height:30px; font-weight:800; text-align:center;}
  .a-message.ok{color:#1f9a63;} .a-message.bad{color:var(--bad);}
  .a-next{display:none; margin-top:10px;} .a-next.show{display:inline-block;}
  .a-stage-wrap{display:flex; flex-direction:column; align-items:center;}

  /* ===== TRACK B (11+) — Koko Kod pastel theme ===== */
  .b-concept-wrap{display:grid; grid-template-columns:repeat(3,1fr); gap:18px; max-width:1000px; margin:0 auto;}
  .b-concept-card{background:#fff; border-radius:20px; padding:22px; border:3px solid var(--plum); box-shadow:6px 6px 0 var(--plum);}
  .b-concept-card .emoji{font-size:2rem;}
  .b-concept-card h3{font-size:1.02rem; margin-top:8px;}
  .b-concept-card p{font-size:.9rem; color:var(--plum-soft); margin-top:6px; line-height:1.5;}

  .b-chapter-block{margin-bottom:26px;}
  .b-chapter-title{display:flex; align-items:center; gap:10px; font-size:1.05rem; margin-bottom:6px;}
  .b-chapter-intro{margin:0 0 10px; font-size:.85rem; font-style:italic; color:var(--plum-soft); max-width:60ch; line-height:1.5;}
  .b-chapter-title .num{width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:'Baloo 2',cursive; font-weight:700; font-size:.9rem;}
  .b-badge-row{display:flex; flex-wrap:wrap; gap:9px;}
  .b-badge{width:52px; height:52px; border-radius:16px; border:none; cursor:pointer; font-family:'Baloo 2',cursive;
    font-weight:700; font-size:.95rem; position:relative; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 0 rgba(0,0,0,.15);}
  .b-badge:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.15);}
  .b-badge.locked{background:#EDE9F5; color:#b6acc9; cursor:not-allowed; box-shadow:none;}
  .b-badge.current{outline:3px solid var(--plum); outline-offset:2px;}
  .b-badge .star{position:absolute; top:-8px; right:-6px; font-size:.8rem;}

  .b-lesson-panel{max-width:1000px; margin:30px auto 0; background:#fff; border-radius:26px; border:3px solid var(--plum);
    box-shadow:8px 8px 0 var(--plum); padding:28px; display:grid; grid-template-columns:1fr 1fr; gap:26px;}
  .b-chapter-badge{display:inline-block; font-weight:800; font-size:.75rem; padding:4px 12px; border-radius:100px; margin-bottom:8px;}
  .b-lesson-left h3{font-size:1.25rem;}
  .b-mascot-icon{font-size:1.2rem; margin-right:6px;}
  .b-story{margin-top:10px; color:var(--plum-soft); font-size:.96rem; line-height:1.55;}
  .b-fact{margin-top:14px; background:var(--lavender); border-left:5px solid var(--lavender-deep); border-radius:10px;
    padding:10px 13px; font-size:.85rem; font-weight:700; color:#4b3a75;}
  .b-action-row{display:flex; gap:8px; margin-top:18px; flex-wrap:wrap;}
  .b-btn-run{background:var(--ok); color:#fff; font-family:'Baloo 2',cursive; font-weight:700; border:none; border-radius:100px;
    padding:11px 22px; cursor:pointer; box-shadow:0 5px 0 #1c8064;}
  .b-btn-run:active{transform:translateY(4px); box-shadow:none;}
  .b-btn-reset{background:#fff; color:var(--bad); border:2px solid var(--bad); font-family:'Baloo 2',cursive; font-weight:700;
    border-radius:100px; padding:11px 18px; cursor:pointer;}
  .b-message{margin-top:14px; min-height:28px; font-weight:800; font-size:.96rem;}
  .b-message.ok{color:var(--ok);} .b-message.bad{color:var(--bad);}
  .b-next{display:none; margin-top:10px;} .b-next.show{display:inline-block;}
  .b-stage-title{font-weight:800; font-size:.8rem; color:var(--plum-soft); margin-bottom:8px; text-transform:uppercase; letter-spacing:.03em;}
  .b-code-block{background:#2A1B33; border-radius:18px; padding:18px; min-height:140px;}
  .b-code-line{color:#F3EAFF; font-family:'Fira Code',monospace; font-size:.88rem; line-height:2.05; display:flex; flex-wrap:wrap; align-items:center; gap:2px;}
  .b-code-text{white-space:pre;}
  .b-blank-input{width:52px; background:#4A3559; border:2px solid var(--pink-deep); border-radius:8px; color:#fff;
    font-family:'Fira Code',monospace; font-size:.86rem; padding:2px 6px; text-align:center;}
  .b-blank-select{background:#4A3559; border:2px solid var(--pink-deep); border-radius:8px; color:#fff;
    font-family:'Fira Code',monospace; font-size:.8rem; padding:3px 6px; max-width:200px;}
  .b-blank-input.right, .b-blank-select.right{border-color:var(--ok); background:#22493f;}
  .b-blank-input.wrong, .b-blank-select.wrong{border-color:var(--bad); background:#4a2436;}
  .b-chip-pool, .b-chip-answer{display:flex; flex-wrap:wrap; gap:8px; min-height:46px; padding:10px; border-radius:14px;}
  .b-chip-pool{background:#F4F1FF; border:2px dashed #C9BFFF; margin-top:10px;}
  .b-chip-answer{background:#2A1B33; margin-top:10px;}
  .b-chip{font-family:'Fira Code',monospace; font-size:.82rem; background:#fff; border:2px solid var(--lavender-deep);
    border-radius:10px; padding:6px 10px; cursor:pointer; font-weight:600;}
  .b-chip.placed{background:var(--pink-deep); color:#fff; border-color:var(--pink-deep);}
  .b-empty-hint{color:#9993c9; font-weight:700; font-size:.82rem;}
  .b-info-card{background:linear-gradient(135deg, var(--navy), #2b2b63); color:#fff; border-radius:18px; padding:22px; line-height:1.6;}
  .b-info-card h4{color:var(--yellow); font-size:1.05rem; margin-bottom:8px;}
  .b-info-card .tags{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .b-info-card .tag{background:rgba(255,255,255,.12); border-radius:100px; padding:5px 12px; font-size:.78rem; font-weight:700;}

  .parents{background:var(--plum); color:#F3EAFF; border-radius:28px; max-width:1000px; margin:0 auto; padding:36px;
    display:grid; grid-template-columns:1fr 1fr; gap:26px;}
  @media (max-width:860px){ .parents{grid-template-columns:1fr;} .a-game-panel{grid-template-columns:1fr;}
    .b-lesson-panel{grid-template-columns:1fr;} .b-concept-wrap{grid-template-columns:1fr;} .track-choice{grid-template-columns:1fr;} }
  .parents h3{font-size:1.15rem; color:var(--gold);}
  .parents ul{padding-left:20px; line-height:1.8; color:#DCCFF0;}
  .parents p{line-height:1.6; color:#DCCFF0;}
  footer{text-align:center; padding:28px 6vw; color:#B2A2C2; font-weight:700; font-size:.82rem;}

  /* ===== STEP FLOW (multi-part lessons) ===== */
  .step-progress{max-width:1000px; margin:0 auto 14px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .step-progress .step-caption{font-weight:800; font-size:.8rem; color:var(--plum-soft); margin-right:6px;}
  .step-dot{width:11px; height:11px; border-radius:50%; background:#E4DCEF; flex:none;}
  .step-dot.done{background:var(--ok);}
  .step-dot.active{background:var(--pink-deep); transform:scale(1.25);}
  .step-kicker{font-weight:800; font-size:.76rem; text-transform:uppercase; letter-spacing:.04em; color:var(--pink-deep); margin-bottom:6px;}
  .single-col{grid-template-columns:1fr !important;}

  /* ===== ENTRANCE ANIMATIONS ===== */

<script>
/* ============================= STORAGE HELPERS ============================= */
/* window.storage only exists inside certain sandboxed preview embeds. On a real
   deployment (GitHub Pages, etc.) it's undefined, so every read/write falls back
   to localStorage — that's what actually persists progress for real players. */
async function loadJSON(key, fallback){
  try{
    if(window.storage){
      const res = await window.storage.get(key, false);
      if(res && res.value) return JSON.parse(res.value);
      return fallback;
    }
  }catch(e){ /* window.storage present but unusable here - fall through to localStorage */ }
  try{
    const raw = localStorage.getItem('kokoKod_' + key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){ return fallback; }
}
async function saveJSON(key, obj){
  try{
    if(window.storage){ await window.storage.set(key, JSON.stringify(obj), false); return; }
  }catch(e){ /* fall through to localStorage */ }
  try{ localStorage.setItem('kokoKod_' + key, JSON.stringify(obj)); }
  catch(e){ console.error('Storage save failed', key, e); }
}

/* ============================= AUDIO NARRATION (Web Speech API) ============================= */
/* Priority feature for pre-readers (6+ course): reads instructions aloud on tap. */
let bgVoice = null;
let ttsUtterance = null; // keep a strong reference - Chrome silently drops speech if the
                          // SpeechSynthesisUtterance gets garbage-collected mid-utterance
if(window.speechSynthesis){
  const pickVoice = () => {
    try{
      const voices = window.speechSynthesis.getVoices();
      bgVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('bg')) || null;
    }catch(e){ /* getVoices can throw in some embedded webviews - ignore, fallback voice used */ }
  };
  pickVoice();
  try{ window.speechSynthesis.onvoiceschanged = pickVoice; }catch(e){}
  // Chrome has a long-standing bug where speech silently pauses ~15s in and never
  // resumes on its own - nudge it periodically so longer instructions finish playing.
  setInterval(() => {
    try{ if(window.speechSynthesis.speaking){ window.speechSynthesis.pause(); window.speechSynthesis.resume(); } }
    catch(e){}
  }, 5000);
}
function speakText(text){
  if(!window.speechSynthesis || !text) return;
  try{
    const clean = text.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}]/gu, '').replace(/\s+/g,' ').trim();
    if(!clean) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(clean);
    // Only force the bg-BG locale when a matching voice actually exists - on many
    // Android/Chrome setups without a Bulgarian voice pack, forcing an unmatched
    // lang makes speak() a silent no-op instead of falling back to a default voice.
    if(bgVoice){ utter.voice = bgVoice; utter.lang = bgVoice.lang; }
    utter.rate = 0.92; utter.pitch = 1.05;
    ttsUtterance = utter;
    // cancel() clears the queue asynchronously; speaking again in the very same tick
    // can get silently dropped by some browsers, so give it a moment to actually clear.
    setTimeout(() => {
      try{ window.speechSynthesis.speak(utter); }catch(e){}
    }, 30);
  }catch(e){ /* speech not supported in this browser - fail silently, button just won't speak */ }
}

/* ============================= CELEBRATION EFFECT ============================= */
/* Lightweight, dependency-free confetti burst for level/lesson completion.
   Respects prefers-reduced-motion via the global CSS override, and is skipped
   entirely for that preference so no motion is forced on sensitive users. */
const CONFETTI_COLORS = ['#FF6FA5','#9B7BFF','#2FB893','#FF9A4D','#4FA1E8','#E3A319','#5B6EE8','#D6467F'];
function fireConfetti(){
  try{
    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const layer = document.createElement('div');
    layer.className = 'confetti-layer';
    document.body.appendChild(layer);
    for(let i=0;i<28;i++){
      const piece = document.createElement('span');
      piece.className = 'confetti-piece';
      piece.style.left = (Math.random()*100) + 'vw';
      piece.style.background = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
      piece.style.animationDelay = (Math.random()*0.3) + 's';
      piece.style.animationDuration = (1.6 + Math.random()*0.9) + 's';
      piece.style.transform = `rotate(${Math.random()*360}deg)`;
      layer.appendChild(piece);
    }
    setTimeout(() => layer.remove(), 2800);
  }catch(e){ /* purely decorative - fail silently */ }
}

/* ============================= PWA: install + offline support ============================= */
/* Feature-detected and wrapped in try/catch: this only activates when the file is actually
   hosted at a real origin (e.g. GitHub Pages, Netlify) alongside manifest.json + service-worker.js.
   Inside a sandboxed preview it silently no-ops rather than breaking anything. */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    try{
      navigator.serviceWorker.register('service-worker.js').catch(() => { /* no real origin available here - expected in preview */ });
    }catch(e){ /* sandboxed context may block SW registration entirely - safe no-op */ }
  });
}
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('installBtn');
  if(btn) btn.classList.remove('hidden');
});
window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  const btn = document.getElementById('installBtn');
  if(btn) btn.classList.add('hidden');
});

/* ============================= INTERESTS (learning tree by interest) ============================= */
const INTERESTS = [
  {id:'space', emoji:'🚀', label:'Космос'},
  {id:'art', emoji:'🎨', label:'Изкуство'},
  {id:'animals', emoji:'🐾', label:'Животни'},
  {id:'games', emoji:'🎮', label:'Игри'},
  {id:'logic', emoji:'🧩', label:'Логика'},
  {id:'story', emoji:'📖', label:'Приказки'}
];

/* ============================= APP STATE ============================= */
let profile = null; // {name, activeTrack, interests:[]}
let progressA = null; // {unlocked:[], stars:[], lastLevel:0}
let progressB = null; // {unlocked:[], stars:[], lastLesson:0}

const onboardRoot = document.getElementById('onboardRoot');
const appShell = document.getElementById('appShell');
const appRoot = document.getElementById('appRoot');

async function boot(){
  onboardRoot.innerHTML = `<div class="onboard"><div class="loading-screen"><div class="spin">🐾</div><p>Зареждане...</p></div></div>`;
  profile = await loadJSON('profile', null);
  if(!profile){
    renderOnboarding();
  }else{
    await enterApp();
  }
}

function renderOnboarding(){
  let chosenTrack = 'A';
  const chosenInterests = new Set();
  onboardRoot.innerHTML = `
  <div class="onboard">
    <div class="onboard-card">
      <div class="mascots">🐱 🐶 👗</div>
      <h1>Добре дошла в Коко Код!</h1>
      <p class="onboard-motto">Където приказките учат децата да програмират.</p>
      <p>Всяко приключение започва с едно име — как се казваш, млад магьоснико? Избери своята пътека: заведи Роби до звездата или тръгни с Луна, Бо и Мия из приказното кралство — а после винаги можеш да смениш пътя.</p>
      <input class="onboard-input" id="nameInput" placeholder="Твоето име" maxlength="20">

        <div class="track-card selected" id="cardA">

        </div>
      </div>
      <div class="interest-head">От какво се интересуваш? (по избор — оформя твоето дърво на ученето)</div>
      <div class="interest-choice" id="interestChoice">
        ${INTERESTS.map(it => `<button type="button" class="interest-chip" data-id="${it.id}">${it.emoji} ${it.label}</button>`).join('')}
      </div>
      <button class="onboard-start" id="startBtn" disabled>Да започваме!</button>
    </div>
  </div>`;
  const nameInput = document.getElementById('nameInput');
  const startBtn = document.getElementById('startBtn');
  const cardA = document.getElementById('cardA');
  const cardB = document.getElementById('cardB');
  function refresh(){ startBtn.disabled = nameInput.value.trim().length === 0; }
  nameInput.addEventListener('input', refresh);
  cardA.addEventListener('click', () => { chosenTrack='A'; cardA.classList.add('selected'); cardB.classList.remove('selected'); });
  cardB.addEventListener('click', () => { chosenTrack='B'; cardB.classList.add('selected'); cardA.classList.remove('selected'); });
  document.querySelectorAll('#interestChoice .interest-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const id = chip.dataset.id;
      if(chosenInterests.has(id)){ chosenInterests.delete(id); chip.classList.remove('selected'); }
      else { chosenInterests.add(id); chip.classList.add('selected'); }
    });
  });
  startBtn.addEventListener('click', async () => {
    profile = { name: nameInput.value.trim() || 'Приятелко', activeTrack: chosenTrack, interests: [...chosenInterests] };
    await saveJSON('profile', profile);
    await enterApp();
  });
}

async function enterApp(){
  onboardRoot.innerHTML = '';
  appShell.classList.remove('hidden');
  if(!Array.isArray(profile.interests)) profile.interests = [];
  document.getElementById('childNameLabel').textContent = profile.name;
  progressA = await loadJSON('progressA', null);
  progressB = await loadJSON('progressB', null);
  document.getElementById('tabA').addEventListener('click', () => switchTrack('A'));
  document.getElementById('tabB').addEventListener('click', () => switchTrack('B'));
  document.getElementById('continueBtn').addEventListener('click', () => switchTrack(profile.activeTrack));
  document.getElementById('installBtn').addEventListener('click', async () => {
    if(!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    document.getElementById('installBtn').classList.add('hidden');
  });
  setupSettings();
  switchTrack(profile.activeTrack || 'A');
}

async function switchTrack(track){
  if(typeof TrackB !== 'undefined' && TrackB.stopGame) TrackB.stopGame();
  profile.activeTrack = track;
  saveJSON('profile', profile);
  document.getElementById('tabA').classList.toggle('active', track==='A');
  document.getElementById('tabB').classList.toggle('active', track==='B');
  appRoot.innerHTML = `<div class="loading-screen"><div class="spin">🐾</div></div>`;
  if(track === 'A'){
    if(!progressA) progressA = { unlocked:TrackA.defaultUnlocked(), stars:TrackA.defaultStars(), lastLevel:0 };
    TrackA.mount(appRoot, progressA, async (p) => { progressA = p; await saveJSON('progressA', progressA); });
  } else {
    if(!progressB) progressB = { unlocked:TrackB.defaultUnlocked(), stars:TrackB.defaultStars(), lastLesson:0 };
    TrackB.mount(appRoot, progressB, async (p) => { progressB = p; await saveJSON('progressB', progressB); });
  }
}

/* ============================= SETTINGS PANEL ============================= */
function setupSettings(){
  const panel = document.getElementById('settingsPanel');
  const overlay = document.getElementById('settingsOverlay');
  const interestsWrap = document.getElementById('settingsInterests');
  interestsWrap.innerHTML = INTERESTS.map(it => `<button type="button" class="interest-chip" data-id="${it.id}">${it.emoji} ${it.label}</button>`).join('');
  let settingsInterestSet = new Set();
  interestsWrap.querySelectorAll('.interest-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const id = chip.dataset.id;
      if(settingsInterestSet.has(id)){ settingsInterestSet.delete(id); chip.classList.remove('selected'); }
      else { settingsInterestSet.add(id); chip.classList.add('selected'); }
    });
  });
  document.getElementById('settingsBtn').addEventListener('click', () => {
    document.getElementById('settingsName').value = profile.name;
    settingsInterestSet = new Set(profile.interests || []);
    interestsWrap.querySelectorAll('.interest-chip').forEach(chip => {
      chip.classList.toggle('selected', settingsInterestSet.has(chip.dataset.id));
    });
    panel.classList.remove('hidden'); overlay.classList.remove('hidden');
  });
  function closeIt(){ panel.classList.add('hidden'); overlay.classList.add('hidden'); }
  document.getElementById('closeSettings').addEventListener('click', closeIt);
  overlay.addEventListener('click', closeIt);
  document.getElementById('saveSettings').addEventListener('click', async () => {
    const val = document.getElementById('settingsName').value.trim();
    if(val) profile.name = val;
    profile.interests = [...settingsInterestSet];
    await saveJSON('profile', profile);
    document.getElementById('childNameLabel').textContent = profile.name;
    if(profile.activeTrack==='B') switchTrack('B');
    closeIt();
  });
  document.getElementById('resetA').addEventListener('click', async () => {
    if(!confirm('Да изчистя ли прогреса за Курс 6+?')) return;
    progressA = { unlocked:TrackA.defaultUnlocked(), stars:TrackA.defaultStars(), lastLevel:0 };
    await saveJSON('progressA', progressA);
    if(profile.activeTrack==='A') switchTrack('A');
  });
  document.getElementById('resetB').addEventListener('click', async () => {
    if(!confirm('Да изчистя ли прогреса за Курс 11+?')) return;
    progressB = { unlocked:TrackB.defaultUnlocked(), stars:TrackB.defaultStars(), lastLesson:0 };
    await saveJSON('progressB', progressB);
    if(profile.activeTrack==='B') switchTrack('B');
  });
}

/* ============================= TRACK A: 6+ (Robi grid) ============================= */

  ];

  let state, onSave, container, currentLevel = 0, program = [], activeMult = 1, running = false, encoreStage = false;

  function defaultUnlocked(){ return levels.map((l,i)=> i===0); }
  function defaultStars(){ return levels.map(()=> false); }

  function mount(rootEl, progress, saveFn){
    state = progress; onSave = saveFn; container = rootEl;
    while(state.unlocked.length < levels.length) state.unlocked.push(false);
    while(state.stars.length < levels.length) state.stars.push(false);
    if(state.lastLevel >= levels.length) state.lastLevel = levels.length-1;
    onSave(state);
    currentLevel = state.lastLevel || 0;
    container.innerHTML = `
      <header class="robi-hero">
        <h2>Заведи Роби до звездата ⭐</h2>
        <p>Избери команди, натисни „Старт“ и веднага виж резултата.</p>
        <div class="robi-mascot">🤖</div>

      <section>
        <div class="a-level-tabs" id="aLevelTabs"></div>
        <div class="a-game-panel">

            <div class="audio-hint-row">
              <button class="audio-btn" id="aAudioBtn">🔊 Слушай</button>
              <button class="hint-btn" id="aHintBtn">💡 Подсказка</button>
            </div>
            <div class="hint-box hidden" id="aHintBox"></div>
            <div class="a-cmd-palette">
              <button class="a-cmd-btn" data-dir="up" aria-label="Нагоре">⬆️</button>
              <button class="a-cmd-btn" data-dir="down" aria-label="Надолу">⬇️</button>
              <button class="a-cmd-btn" data-dir="left" aria-label="Наляво">⬅️</button>
              <button class="a-cmd-btn" data-dir="right" aria-label="Надясно">➡️</button>
            </div>
            <div class="a-mult-row" id="aMultRow">
              <span>Повтори:</span>
              <button class="a-mult-btn active" data-n="1">x1</button>
              <button class="a-mult-btn" data-n="2">x2</button>
              <button class="a-mult-btn" data-n="3">x3</button>
              <button class="a-mult-btn" data-n="4">x4</button>
              <button class="a-mult-btn" data-n="5">x5</button>
            </div>
            <div class="a-program" id="aProgram"></div>
            <div class="a-action-row">
              <button class="a-btn-run" id="aRun">▶ Старт</button>
              <button class="a-btn-clear" id="aClear">Изчисти</button>
            </div>
          </div>
          <div class="a-stage-wrap">
            <div class="a-grid-stage" id="aGrid"></div>
            <div class="a-message" id="aMsg" role="status"></div>
            <button class="btn btn-primary a-next" id="aNext" style="border:none;background:var(--yellow);color:var(--navy);font-family:'Baloo 2',cursive;font-weight:700;border-radius:100px;padding:10px 20px;cursor:pointer;">Следващо ниво →</button>
          </div>

    wireControls();

  function wireControls(){
    container.querySelectorAll('.a-cmd-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if(running) return;
        program.push({dir: btn.dataset.dir, count: activeMult});
        renderProgram();
      });
    });
    container.querySelectorAll('.a-mult-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeMult = parseInt(btn.dataset.n, 10);
        container.querySelectorAll('.a-mult-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    container.querySelector('#aClear').addEventListener('click', () => {
      if(running) return;
      program = []; renderProgram();
      container.querySelector('#aMsg').textContent = ''; container.querySelector('#aMsg').className='a-message';
      const lvl = levels[currentLevel]; positionToken(lvl.start[0], lvl.start[1]);
    });
    container.querySelector('#aRun').addEventListener('click', runProgram);
    container.querySelector('#aNext').addEventListener('click', () => {
      if(currentLevel < levels.length-1){ currentLevel++; state.lastLevel = currentLevel; onSave(state); loadLevel(); }
    });
    container.querySelector('#aAudioBtn').addEventListener('click', () => {
      const lvl = levels[currentLevel];

    });

      box.textContent = '💡 ' + lvl.hint;

      speakText(lvl.hint);

  }

  function renderTabs(){
    const wrap = container.querySelector('#aLevelTabs'); wrap.innerHTML = '';

      const tab = document.createElement('button');
      tab.className = 'a-level-tab' + (i===currentLevel?' active':'') + (!state.unlocked[i]?' locked':'');
      tab.innerHTML = `Ниво ${i+1} ${state.stars[i] ? '⭐' : ''}`;
      tab.disabled = !state.unlocked[i];
      tab.onclick = () => { currentLevel = i; state.lastLevel = i; onSave(state); loadLevel(); };
      wrap.appendChild(tab);
    });
  }

  function loadLevel(){
    const lvl = levels[currentLevel];
    program = []; activeMult = 1; running = false; encoreStage = false;
    container.querySelector('#aBadge').textContent = 'Ниво ' + (currentLevel+1);
    container.querySelector('#aTitle').textContent = lvl.title;
    container.querySelector('#aText').textContent = lvl.text;
    container.querySelector('#aTip').textContent = lvl.tip;
    container.querySelector('#aMultRow').style.display = lvl.showMultiplier ? 'flex' : 'none';
    container.querySelectorAll('.a-mult-btn').forEach(b => b.classList.toggle('active', b.dataset.n==='1'));
    container.querySelector('#aMsg').textContent=''; container.querySelector('#aMsg').className='a-message';
    container.querySelector('#aNext').classList.remove('show');
    container.querySelector('#aHintBox').classList.add('hidden');
    renderTabs(); renderProgram(); buildGrid();
  }

  function buildGrid(){
    const lvl = levels[currentLevel];
    const grid = container.querySelector('#aGrid');
    grid.style.gridTemplateColumns = `repeat(${lvl.cols}, 46px)`;
    grid.style.gridTemplateRows = `repeat(${lvl.rows}, 46px)`;
    grid.innerHTML = '';
    for(let r=0;r<lvl.rows;r++) for(let c=0;c<lvl.cols;c++){
      const cell = document.createElement('div'); cell.className='a-cell';
      const isWall = lvl.walls.some(w=>w[0]===r&&w[1]===c);

      if(isWall){ cell.classList.add('wall'); cell.textContent=lvl.wallEmoji || '🪨'; }
      else if(isGoal){ cell.classList.add('goal'); cell.textContent=lvl.goalEmoji || '⭐'; }
      grid.appendChild(cell);
    }
    const token = document.createElement('div'); token.className='a-robot-token'; token.id='aToken'; token.textContent='🤖';
    grid.appendChild(token);
    positionToken(lvl.start[0], lvl.start[1]);
  }

  function positionToken(r,c){
    const token = container.querySelector('#aToken');
    token.style.left = (c*(46+4)+10)+'px'; token.style.top = (r*(46+4)+10)+'px';
  }

  function renderProgram(){
    const strip = container.querySelector('#aProgram'); strip.innerHTML='';
    if(program.length===0){ strip.innerHTML = '<span class="a-empty-hint">Натисни стрелките, за да построиш програмата ⬆️➡️</span>'; return; }
    const icons = {up:'⬆️',down:'⬇️',left:'⬅️',right:'➡️'};
    program.forEach((step,idx) => {
      const chip = document.createElement('span'); chip.className='a-chip';
      chip.innerHTML = `${icons[step.dir]} ${step.count>1?'x'+step.count:''}`;
      chip.onclick = () => { if(!running){ program.splice(idx,1); renderProgram(); } };
      strip.appendChild(chip);
    });
  }

  function delay(ms){ return new Promise(res=>setTimeout(res,ms)); }

  async function runProgram(){
    if(running || program.length===0) return;
    running = true;
    container.querySelector('#aNext').classList.remove('show');
    const lvl = levels[currentLevel];
    let r=lvl.start[0], c=lvl.start[1];
    positionToken(r,c);
    const msg = container.querySelector('#aMsg'); msg.textContent=''; msg.className='a-message';

    let blocked = false;

        let nr=r, nc=c;
        if(step.dir==='up') nr--; if(step.dir==='down') nr++;
        if(step.dir==='left') nc--; if(step.dir==='right') nc++;

        const wall = lvl.walls.some(w=>w[0]===nr&&w[1]===nc);
        if(oob||wall){ blocked=true; shake(); break outer; }
        r=nr; c=nc; positionToken(r,c); await delay(300);
        if(r===lvl.goal[0]&&c===lvl.goal[1]) break outer;
      }
    }
    await delay(150);
    if(r===lvl.goal[0]&&c===lvl.goal[1]){
      if(!encoreStage){
        encoreStage = true;
        state.stars[currentLevel] = true;
        onSave(state); renderTabs();
        msg.textContent = '🌟 Супер! Сега опитай пак — сама, без да гледаш старата програма — за да затвърдиш наученото!';
        msg.className='a-message ok';
        speakText('Супер! Сега опитай пак сама, за да затвърдиш наученото.');
        setTimeout(() => {
          program = []; renderProgram();
          const lvl2 = levels[currentLevel]; positionToken(lvl2.start[0], lvl2.start[1]);
        }, 1400);
      } else {
        msg.textContent = '🎉 Браво! Роби стигна до звездата и втори път — научи го наистина добре!'; msg.className='a-message ok';
        speakText('Браво! Роби стигна до звездата и втори път! Научи го наистина добре.');
        if(currentLevel < levels.length-1){ state.unlocked[currentLevel+1]=true; container.querySelector('#aNext').classList.add('show'); }
        else msg.textContent += ' 🏆 Завърши всички нива!';
        onSave(state); renderTabs();
        fireConfetti();
      }
    } else {
      msg.textContent = '🙈 Опа! Роби се блъсна. Оправи програмата и опитай пак.'; msg.className='a-message bad';
      speakText('Опа! Роби се блъсна. Оправи програмата и опитай пак.');
    }
    running = false;
  }

  function shake(){
    const token = container.querySelector('#aToken');
    token.style.transition='none'; token.textContent='💥';
    setTimeout(()=>{ token.textContent='🤖'; token.style.transition='left .3s ease, top .3s ease'; }, 480);
  }

  return { mount, defaultUnlocked, defaultStars };
})();

  function defaultUnlocked(){ return lessons.map((l,i)=> i===0); }
  function defaultStars(){ return lessons.map(()=> false); }

  const mascots = ['🐱','🐶','👗'];
  lessons.forEach((l,i)=>{ l.id=i+1; l.mascot = mascots[i%3]; });
  function chapterFor(id){ return chapters.find(c => id>=c.range[0] && id<=c.range[1]); }

  let state, onSave, container, current = 0, orderState = [], steps = [], stepIdx = 0;

  function mount(rootEl, progress, saveFn){
    state = progress; onSave = saveFn; container = rootEl;
    while(state.unlocked.length < lessons.length) state.unlocked.push(false);
    while(state.stars.length < lessons.length) state.stars.push(false);
    for(let i=0; i<lessons.length-1; i++){ if(state.stars[i] && !state.unlocked[i+1]) state.unlocked[i+1] = true; }
    if(state.lastLesson >= lessons.length) state.lastLesson = lessons.length-1;
    onSave(state);
    current = state.lastLesson || 0;
    container.innerHTML = `
      <section>
        <div class="section-head">
          <span class="kicker">Практика</span>
          <h2>Пътят на Луна, Бо и Мия</h2>
          <p>Всеки урок има обяснение, упражнение, кратък преговор и самостоятелна практика — общо около 15–20 минути. След глава 7 се отключва живата арена за кодиране!</p>
          <button class="hint-btn" id="bReviewBtn" style="margin-top:14px;">🔄 Бърз преговор на стари уроци</button>
        </div>
        <div id="bRecoBanner"></div>
        <div id="bChapterList"></div>
        <div class="step-progress" id="bStepProgress"></div>
        <div class="b-lesson-panel" id="bPanel">
          <div class="b-lesson-left" id="bLeftCol"></div>
          <div class="b-lesson-right" id="bRightCol"></div>
        </div>
      </section>`;
    container.querySelector('#bReviewBtn').addEventListener('click', startReview);
    renderMap(); loadLesson();
  }

  function renderMap(){
    const wrap = container.querySelector('#bChapterList'); wrap.innerHTML = '';
    const myInterests = (typeof profile !== 'undefined' && profile && Array.isArray(profile.interests)) ? profile.interests : [];
    const matched = myInterests.length ? chapters.filter(ch => ch.tags && ch.tags.some(t => myInterests.includes(t))) : [];
    const bannerHost = container.querySelector('#bRecoBanner');
    if(bannerHost){
      if(matched.length){
        const labels = INTERESTS.filter(it => myInterests.includes(it.id)).map(it => it.emoji + ' ' + it.label).join(', ');
        bannerHost.innerHTML = `<div class="reco-banner">
          <h4>🌳 Твоето дърво на ученето</h4>
          <p>Избрала си: ${labels}. Ето главите, които най-много ти пасват — търси значката ✨ по-долу!</p>
          <div class="reco-jumps">${matched.map(ch => `<button class="reco-jump-btn" data-ch="${ch.n}">${ch.n}. ${ch.title}</button>`).join('')}</div>
        </div>`;
        bannerHost.querySelectorAll('.reco-jump-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const ch = chapters.find(c => c.n === parseInt(btn.dataset.ch,10));
            const idx = ch.range[0]-1;
            if(state.unlocked[idx]){ current = idx; loadLesson();
              container.querySelector('#bPanel').scrollIntoView({behavior:'smooth', block:'center'}); }
            else { container.querySelector(`.b-chapter-block[data-ch="${ch.n}"]`)?.scrollIntoView({behavior:'smooth', block:'center'}); }
          });
        });
      } else bannerHost.innerHTML = '';
    }
    chapters.forEach(ch => {
      const block = document.createElement('div'); block.className='b-chapter-block'; block.dataset.ch = ch.n;
      const [bg, deep] = ch.color;
      const isReco = matched.includes(ch);
      const title = document.createElement('div'); title.className='b-chapter-title';
      title.innerHTML = `<span class="num" style="background:${deep}">${ch.n}</span><span>${ch.title}</span>${isReco ? '<span class="reco-badge" title="Препоръчано за теб по интереси">✨</span>' : ''}`;
      block.appendChild(title);
      if(ch.intro){
        const intro = document.createElement('p'); intro.className='b-chapter-intro'; intro.textContent = ch.intro;
        block.appendChild(intro);
      }
      const row = document.createElement('div'); row.className='b-badge-row';
      for(let id=ch.range[0]; id<=ch.range[1]; id++){
        const idx = id-1;
        const btn = document.createElement('button');
        btn.className = 'b-badge' + (!state.unlocked[idx]?' locked':'') + (idx===current?' current':'');
        btn.style.background = state.unlocked[idx] ? bg : '';
        btn.style.color = state.unlocked[idx] ? '#3E2247' : '';
        btn.innerHTML = id + (state.stars[idx] ? '<span class="star">⭐</span>' : '');
        btn.disabled = !state.unlocked[idx];
        btn.onclick = () => { current = idx; loadLesson();
          container.querySelector('#bPanel').scrollIntoView({behavior:'smooth', block:'center'}); };
        row.appendChild(btn);
      }
      block.appendChild(row); wrap.appendChild(block);
    });
  }

  function buildQuiz(lesson, idx){
    const pool = lessons.filter((l,i) => i!==idx).map(l => l.fact);
    const shuffled = pool.slice().sort(() => Math.random()-0.5).slice(0,2);
    const options = [lesson.fact, ...shuffled].sort(() => Math.random()-0.5);
    return { correct: lesson.fact, options };
  }

  function buildSteps(lesson, idx){
    const built = [{kind:'explain'}];
    if(lesson.type === 'info'){
      built.push({kind:'inforead'});
      built.push(Object.assign({kind:'quiz'}, buildQuiz(lesson, idx)));
    } else if(lesson.type === 'live'){
      built.push({kind:'live'});
    } else if(lesson.type === 'draw'){
      built.push({kind:'draw'});
    } else if(lesson.type === 'game'){
      built.push({kind:'game'});
    } else {
      built.push({kind:'exercise', repeat:false});
      built.push(Object.assign({kind:'quiz'}, buildQuiz(lesson, idx)));
      built.push({kind:'exercise', repeat:true});
    }
    built.push({kind:'complete'});
    return built;
  }

  function loadLesson(){
    state.lastLesson = current; onSave(state);
    steps = buildSteps(lessons[current], current);
    stepIdx = 0;
    renderMap(); renderStep();
  }

  function renderStepProgress(){
    const wrap = container.querySelector('#bStepProgress'); wrap.innerHTML = '';
    const cap = document.createElement('span'); cap.className='step-caption';
    cap.textContent = `Стъпка ${stepIdx+1} от ${steps.length}`;
    wrap.appendChild(cap);
    steps.forEach((s,i) => {
      const dot = document.createElement('span');
      dot.className = 'step-dot' + (i<stepIdx?' done':'') + (i===stepIdx?' active':'');
      wrap.appendChild(dot);
    });
  }

  function renderStep(){
    stopGame();
    const lesson = lessons[current];
    const ch = chapterFor(lesson.id);
    renderStepProgress();
    const left = container.querySelector('#bLeftCol');
    const right = container.querySelector('#bRightCol');
    const panel = container.querySelector('#bPanel');
    left.innerHTML=''; right.innerHTML=''; right.style.display='block'; panel.classList.remove('single-col');
    const step = steps[stepIdx];
    const badgeHtml = `<span class="b-chapter-badge" style="background:${ch.color[0]};color:${ch.color[1]}">Урок ${lesson.id} · Глава ${ch.n}</span>`;

    if(step.kind === 'explain'){
      const note = lesson.type==='info' ? 'Натисни напред, за да продължиш.'
        : lesson.type==='live' ? 'Ето синтаксиса, който ще използваш — после ще напишеш истински движещ код!'

  function buildLiveGrid(grid, gridEl){
    gridEl.style.gridTemplateColumns = `repeat(${grid.cols}, 46px)`;
    gridEl.style.gridTemplateRows = `repeat(${grid.rows}, 46px)`;
    gridEl.innerHTML = '';
    for(let r=0;r<grid.rows;r++){
      for(let c=0;c<grid.cols;c++){
        const cell = document.createElement('div'); cell.className='a-cell';
        const isWall = grid.walls.some(w=>w[0]===r&&w[1]===c);
        const isGoal = grid.goal[0]===r && grid.goal[1]===c;
        if(isWall){ cell.classList.add('wall'); cell.textContent='🪨'; }
        else if(isGoal){ cell.classList.add('goal'); cell.textContent='⭐'; }
        gridEl.appendChild(cell);
      }
    }
    const token = document.createElement('div'); token.className='a-robot-token'; token.id='bLiveToken'; token.textContent='🧚‍♀️';
    gridEl.appendChild(token);
    positionLiveToken(grid.start[0], grid.start[1], gridEl);
  }

  function positionLiveToken(r, c, gridEl){
    const token = gridEl.querySelector('#bLiveToken');
    token.style.left = (c*(46+4)+10)+'px'; token.style.top = (r*(46+4)+10)+'px';
  }

  function delay(ms){ return new Promise(res=>setTimeout(res,ms)); }

  async function runLive(lesson, gridEl, msgEl, nextBtn){
    const codeEl = container.querySelector('#bLiveCode');
    const values = {}; let allFilled = true;
    lesson.blanks.forEach(b => {
      const el = codeEl.querySelector(`[data-id="${b.id}"]`);
      const val = (el.value||'').trim();
      if(val==='') allFilled = false;
      values[b.id] = val;
    });
    if(!allFilled){ msgEl.textContent = '✏️ Попълни всички стойности в кода първо.'; msgEl.className='a-message bad'; return; }

    const moves = lesson.compile(values);
    const grid = lesson.grid;
    let r = grid.start[0], c = grid.start[1];
    positionLiveToken(r, c, gridEl);
    msgEl.textContent=''; msgEl.className='a-message';
    await delay(200);
    let blocked = false;
    outer: for(const seg of moves){
      const n = Math.max(0, seg.count||0);
      for(let i=0;i<n;i++){
        let nr=r, nc=c;
        if(seg.dir==='up') nr--; if(seg.dir==='down') nr++;
        if(seg.dir==='left') nc--; if(seg.dir==='right') nc++;
        const oob = nr<0||nr>=grid.rows||nc<0||nc>=grid.cols;
        const wall = grid.walls.some(w=>w[0]===nr&&w[1]===nc);
        if(oob||wall){ blocked=true; break outer; }
        r=nr; c=nc; positionLiveToken(r,c,gridEl); await delay(300);
        if(r===grid.goal[0] && c===grid.goal[1]) break outer;
      }
    }
    await delay(150);
    if(r===grid.goal[0] && c===grid.goal[1]){
      msgEl.textContent = '🎉 ' + lesson.successMsg; msgEl.className='a-message ok';
      nextBtn.disabled = false;
    } else if(blocked){
      msgEl.textContent = '💥 Опа! Кодът изведе героя извън пътя. Провери числата и посоките и пробвай пак.'; msgEl.className='a-message bad';
    } else {
      msgEl.textContent = '🤔 Почти! Героят спря, но не стигна звездата. Коригирай кода и пробвай пак.'; msgEl.className='a-message bad';
    }
  }

  async function runDraw(lesson, msgEl, nextBtn){
    const codeEl = container.querySelector('#bDrawCode');
    let allFilled = true; const values = {};
    lesson.blanks.forEach(b => {
      const el = codeEl.querySelector(`[data-id="${b.id}"]`);
      const val = (el.value||'').trim();
      if(val==='') allFilled=false;
      values[b.id] = val;
    });
    if(!allFilled){ msgEl.textContent='✏️ Попълни всички стойности първо.'; msgEl.className='a-message bad'; return; }
    const ops = lesson.compile(values);
    const cv = container.querySelector('#bDrawCanvas');
    const ctx = cv.getContext('2d');
    clearDrawCanvas(lesson);
    let x = cv.width/2, y = cv.height/2, angle = 0, color = '#D6467F';
    ctx.lineWidth = 3; ctx.lineCap = 'round';
    msgEl.textContent=''; msgEl.className='a-message';
    for(const op of ops){
      if(op.op === 'color'){ color = op.value; await delay(30); }
      else if(op.op === 'turn'){ angle = (angle + (op.deg||0)) % 360; await delay(30); }
      else if(op.op === 'forward'){
        const dist = Math.max(0, Math.min(300, op.dist||0));
        const nx = x + dist*Math.sin(angle*Math.PI/180);
        const ny = y - dist*Math.cos(angle*Math.PI/180);
        ctx.strokeStyle = color;
        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(nx,ny); ctx.stroke();
        x = nx; y = ny;
        await delay(90);
      }
    }
    msgEl.textContent = '🎉 ' + lesson.successMsg; msgEl.className='a-message ok';
    nextBtn.disabled = false;
  }

  async function startGame(lesson, msgEl, nextBtn){

    const W = cv.width, H = cv.height;

    ['mouseup','mouseleave','touchend'].forEach(ev => { leftBtn.addEventListener(ev, clearHeld); rightBtn.addEventListener(ev, clearHeld); });
    gameKeyHandler = {
      down:(e) => { if(e.key==='ArrowLeft') gameHeld='left'; if(e.key==='ArrowRight') gameHeld='right'; },
      up:(e) => { if(e.key==='ArrowLeft' || e.key==='ArrowRight') gameHeld=null; }
    };
    document.addEventListener('keydown', gameKeyHandler.down);
    document.addEventListener('keyup', gameKeyHandler.up);

    function spawnItem(){
      const isRock = Math.random()*100 < (cfg.rockChance||0);
      items.push({ x: 20+Math.random()*(W-40), y: -10, isRock, speed: 1.2 + cfg.speed*0.5 });
    }

    function frame(ts){
      if(!running) return;
      ctx.fillStyle = '#1B1B3A'; ctx.fillRect(0,0,W,H);

      if(gameHeld==='left') basketX = Math.max(basketW/2, basketX - 5);
      if(gameHeld==='right') basketX = Math.min(W-basketW/2, basketX + 5);

      if(!lastSpawn || ts - lastSpawn > Math.max(350, 1000 - cfg.speed*90)){ spawnItem(); lastSpawn = ts; }

      for(let i=items.length-1; i>=0; i--){
        const it = items[i];
        it.y += it.speed;
        ctx.font = '20px sans-serif'; ctx.textAlign='center';
        ctx.fillText(it.isRock ? '🪨' : '⭐', it.x, it.y);
        if(it.y > basketY-10 && it.y < basketY+16 && Math.abs(it.x-basketX) < basketW/2+8){
          if(it.isRock){ score = Math.max(0, score-1); } else { score += 1; }
          items.splice(i,1);
        } else if(it.y > H+10){
          items.splice(i,1);
        }
      }

      ctx.font = '28px sans-serif'; ctx.textAlign='center';
      ctx.fillText('🧺', basketX, basketY+22);

      scoreEl.textContent = `⭐ ${score} / ${cfg.winScore}`;

      if(score >= cfg.winScore){
        running = false; stopGame();
        msgEl.textContent = '🎉 ' + lesson.successMsg; msgEl.className='a-message ok';
        nextBtn.disabled = false;
        return;
      }
      gameRAF = requestAnimationFrame(frame);
    }
    gameRAF = requestAnimationFrame(frame);
  }

  function renderExerciseStage(lesson, ex){
    const stage = container.querySelector('#bStage'); stage.innerHTML='';
    if(lesson.type === 'blanks'){
      ex.codeLines.forEach(lineStr => {
        const lineEl = document.createElement('div'); lineEl.className='b-code-line';
        const parts = lineStr.split(/(\{\{\w+\}\})/g).filter(s=>s!=='');
        parts.forEach(part => {
          const m = part.match(/^\{\{(\w+)\}\}$/);
          if(m){
            const blank = ex.blanks.find(b=>b.id===m[1]);
            if(blank.kind==='number'){
              const inp = document.createElement('input');
              inp.type='number'; inp.className='b-blank-input'; inp.dataset.id=blank.id; inp.placeholder='?';
              lineEl.appendChild(inp);
            } else {
              const sel = document.createElement('select');
              sel.className='b-blank-select'; sel.dataset.id=blank.id;
              const def = document.createElement('option'); def.value=''; def.textContent='— избери —';
              sel.appendChild(def);
              blank.options.forEach(o => { const opt=document.createElement('option'); opt.value=o.value; opt.textContent=o.label; sel.appendChild(opt); });
              lineEl.appendChild(sel);
            }
          } else {
            const span = document.createElement('span'); span.className='b-code-text'; span.textContent=part;
            lineEl.appendChild(span);
          }
        });
        stage.appendChild(lineEl);
      });
    } else if(lesson.type === 'order'){
      orderState = [];
      const poolTitle = document.createElement('div'); poolTitle.className='b-code-line';
      poolTitle.innerHTML = '<span class="b-code-text" style="color:#C9BFFF;">// избери реда, в който да поставиш командите:</span>';
      stage.appendChild(poolTitle);
      const answer = document.createElement('div'); answer.className='b-chip-answer'; answer.id='bChipAnswer';
      const pool = document.createElement('div'); pool.className='b-chip-pool'; pool.id='bChipPool';
      stage.appendChild(answer); stage.appendChild(pool);
      renderChips(ex);
    }
  }


  function renderWorked(lesson, el){
    el.innerHTML='';
    if(lesson.type === 'blanks'){
      lesson.codeLines.forEach(lineStr => {
        const lineEl = document.createElement('div'); lineEl.className='b-code-line';
        const parts = lineStr.split(/(\{\{\w+\}\})/g).filter(s=>s!=='');
        parts.forEach(part => {
          const m = part.match(/^\{\{(\w+)\}\}$/);
          if(m){
            const blank = lesson.blanks.find(b=>b.id===m[1]);
            const span = document.createElement('span'); span.className='worked-badge';
            if(blank.kind==='select'){
              const opt = blank.options.find(o=>o.value===String(blank.correct));
              span.textContent = opt ? opt.label : blank.correct;
            } else { span.textContent = blank.correct; }
            lineEl.appendChild(span);
          } else {
            const span = document.createElement('span'); span.className='b-code-text'; span.textContent=part;
            lineEl.appendChild(span);
          }
        });
        el.appendChild(lineEl);
      });
    } else if(lesson.type === 'order'){
      lesson.correctOrder.forEach((id,i) => {
        const c = lesson.chips.find(x=>x.id===id);
        const lineEl = document.createElement('div'); lineEl.className='b-code-line';
        lineEl.innerHTML = `<span class="worked-badge">${i+1}</span><span class="b-code-text">${c.label}</span>`;
        el.appendChild(lineEl);
      });
    }
  }

  function renderChips(lesson){
    const pool = container.querySelector('#bChipPool');
    const answer = container.querySelector('#bChipAnswer');
    pool.innerHTML='';
    lesson.chips.forEach(c => {
      if(orderState.includes(c.id)) return;
      const chip = document.createElement('button'); chip.className='b-chip'; chip.textContent=c.label;
      chip.onclick = () => { orderState.push(c.id); renderChips(lesson); };
      pool.appendChild(chip);
    });
    answer.innerHTML='';
    if(orderState.length===0){ answer.innerHTML = '<span class="b-empty-hint">Натисни командите отдолу в правилния ред</span>'; }
    else {
      orderState.forEach((id,i) => {
        const c = lesson.chips.find(x=>x.id===id);
        const chip = document.createElement('button'); chip.className='b-chip placed'; chip.textContent=(i+1)+'. '+c.label;
        chip.onclick = () => { orderState.splice(i,1); renderChips(lesson); };
        answer.appendChild(chip);
      });
    }
  }

  function checkExercise(lesson, ex){
    const msg = container.querySelector('#bMsg');
    let success = false;
    if(lesson.type === 'blanks'){
      let allRight = true;
      ex.blanks.forEach(b => {
        const el = container.querySelector(`#bStage [data-id="${b.id}"]`);
        const val = (el.value||'').trim();
        const ok = val!=='' && val===String(b.correct).trim();
        el.classList.toggle('right', ok); el.classList.toggle('wrong', !ok);
        if(!ok) allRight=false;
      });
      success = allRight;
    } else if(lesson.type === 'order'){
      success = orderState.length===ex.correctOrder.length && orderState.every((id,i)=> id===ex.correctOrder[i]);
    }
    if(success){
      let extra = '';
      if(ex.resultCountId){
        const el = container.querySelector(`#bStage [data-id="${ex.resultCountId}"]`);
        const n = Math.min(parseInt(el.value,10)||0, 12);
        extra = ' ' + (ex.resultEmoji||'⭐').repeat(n);
      }
      msg.textContent = '🎉 ' + ex.successMsg + extra; msg.className='b-message ok';
      container.querySelector('#stepNextBtn').disabled = false;
    } else {
      msg.innerHTML = `🤔 <strong>Не съвсем.</strong> ${lesson.fact}<br>Помисли отново върху обяснението, преди да пробваш пак.`;
      msg.className='b-message bad';
      const checkBtn = container.querySelector('#bCheck');
      const resetBtn = container.querySelector('#bReset');
      const fields = Array.from(container.querySelectorAll('#bStage [data-id]'));
      startLockout(msg, 10, [checkBtn, resetBtn, ...fields]);
    }
  }

  function startLockout(msgEl, seconds, elsToDisable){
    let remaining = seconds;
    const baseHTML = msgEl.innerHTML;
    elsToDisable.forEach(el => { if(el) el.disabled = true; });
    const tick = () => {
      msgEl.innerHTML = baseHTML + `<br><span class="lockout-timer">⏳ Можеш да пробваш пак след ${remaining} сек...</span>`;
      remaining--;
      if(remaining < 0){
        clearInterval(iv);
        elsToDisable.forEach(el => { if(el) el.disabled = false; });
        msgEl.innerHTML = baseHTML + `<br><span class="lockout-timer" style="color:var(--ok);">✏️ Пробвай сега!</span>`;
      }
    };
    tick();
    const iv = setInterval(tick, 1000);
  }

  let reviewQueue = [], reviewIdx = 0, reviewCorrect = 0;

  function startReview(){
    stopGame();
    const completed = lessons.map((l,i)=>i).filter(i => state.stars[i]);
    if(completed.length === 0){
      alert('Все още няма завършени уроци за преговор. Довърши поне един урок и се върни тук!');
      return;
    }
    reviewQueue = completed.slice().sort(() => Math.random()-0.5).slice(0, Math.min(8, completed.length));
    reviewIdx = 0; reviewCorrect = 0;
    renderReviewQuestion();
  }

  function renderReviewQuestion(){
    const prog = container.querySelector('#bStepProgress');
    prog.innerHTML = `<span class="step-caption">🔄 Преговор: въпрос ${reviewIdx+1} от ${reviewQueue.length}</span>`;
    const left = container.querySelector('#bLeftCol');
    const right = container.querySelector('#bRightCol');
    const panel = container.querySelector('#bPanel');
    right.innerHTML=''; right.style.display='none'; panel.classList.add('single-col');
    const lesson = lessons[reviewQueue[reviewIdx]];
    const q = buildQuiz(lesson, reviewQueue[reviewIdx]);
    left.innerHTML = `<div class="step-kicker">Бърз преговор</div>
      <h3><span class="b-mascot-icon">${lesson.mascot}</span>Урок ${lesson.id}: ${lesson.title}</h3>
      <button class="audio-btn" id="reviewAudioBtn" style="margin-bottom:10px;">🔊 Слушай</button>
      <div class="quiz-question">Кое от следните е вярно?</div>
      <div id="reviewOpts"></div>
      <div class="b-message" id="reviewMsg" role="status"></div>`;
    container.querySelector('#reviewAudioBtn').addEventListener('click', () => speakText(lesson.fact));
    const optsWrap = container.querySelector('#reviewOpts');
    const msgEl = container.querySelector('#reviewMsg');
    q.options.forEach(opt => {
      const btn = document.createElement('button'); btn.className='quiz-opt'; btn.textContent=opt;
      btn.onclick = () => {
        const isRight = opt === q.correct;
        if(isRight){
          btn.classList.add('right'); reviewCorrect++;
          msgEl.textContent = '🎉 Точно!'; msgEl.className='b-message ok';
          optsWrap.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
          setTimeout(() => { reviewIdx++; if(reviewIdx>=reviewQueue.length) renderReviewSummary(); else renderReviewQuestion(); }, 1000);
        } else {
          btn.classList.add('wrong'); btn.disabled = true;
          msgEl.innerHTML = `🤔 <strong>Не точно.</strong> ${lesson.fact}`;
          msgEl.className = 'b-message bad';
          const others = Array.from(optsWrap.querySelectorAll('.quiz-opt')).filter(b=>!b.classList.contains('wrong'));
          startLockout(msgEl, 10, others);
        }
      };
      optsWrap.appendChild(btn);
    });
  }

  function renderReviewSummary(){
    const prog = container.querySelector('#bStepProgress'); prog.innerHTML = '';
    const left = container.querySelector('#bLeftCol');
    const ratio = reviewCorrect / reviewQueue.length;
    const praise = ratio === 1 ? '🌟 Перфектно! Помниш всичко отлично!' : ratio >= 0.6 ? '👏 Много добре, продължавай да учиш!' : '💪 Добро начало — повтарянето прави майстора!';
    left.innerHTML = `<div class="complete-card">
        <div class="big-star">🔄⭐</div>
        <h3>Преговорът приключи!</h3>
        <p class="b-story">Позна ${reviewCorrect} от ${reviewQueue.length} въпроса. ${praise}</p>
        <div class="step-nav" style="justify-content:center;">
          <button class="step-next" id="reviewBackBtn">Обратно към уроците →</button>
        </div>
      </div>`;
    container.querySelector('#reviewBackBtn').addEventListener('click', () => loadLesson());
  }

  return { mount, defaultUnlocked, defaultStars, stopGame };
})();

boot();
</script>
</body>

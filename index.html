<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Коко Код Академия</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF6FA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Коко Код">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@500;600;700;800&family=Fira+Code:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="onboardRoot"></div>

<div id="appShell" class="hidden">
  <nav class="app-nav">
    <div class="app-brand">🐾 Коко Код Академия</div>
    <div class="app-user">👤 <span id="childNameLabel"></span></div>
    <div class="app-tabs">
      <button class="app-tab" id="tabA">🧸 Курс 6+</button>
      <button class="app-tab" id="tabB">🎀 Курс 11+</button>
    </div>
    <button class="app-continue" id="continueBtn">▶ Продължи</button>
    <button class="app-continue hidden" id="installBtn">📲 Инсталирай</button>
    <button class="app-settings" id="settingsBtn" title="Настройки" aria-label="Настройки">⚙️</button>
  </nav>
  <main id="appRoot"></main>
</div>

<div id="settingsOverlay" class="overlay-bg hidden"></div>
<div id="settingsPanel" class="settings-panel hidden">
  <button class="close-x" id="closeSettings" aria-label="Затвори настройките">✕</button>
  <h3>Настройки</h3>
  <div class="settings-row">
    <label>Име на детето</label>
    <input type="text" id="settingsName">
  </div>
  <div class="settings-row">
    <label>Интереси (за твоето дърво на ученето)</label>
    <div class="interest-choice" id="settingsInterests"></div>
  </div>
  <button class="btn-save" id="saveSettings">Запази</button>
  <div class="settings-row">
    <label>Прогрес — Курс 6+</label>
    <button class="btn-danger" id="resetA">Изчисти прогреса</button>
  </div>
  <div class="settings-row">
    <label>Прогрес — Курс 11+</label>
    <button class="btn-danger" id="resetB">Изчисти прогреса</button>
  </div>
  <div class="settings-row">
    <label>📲 Инсталирай на телефона</label>
    <p style="font-size:.82rem; color:var(--plum-soft); font-weight:600; line-height:1.5; margin:0;">
      На Android: използвай бутона „Инсталирай“ горе.<br>
      На iPhone: Сподели 🔗 → „Добави към Начален екран“.
    </p>
  </div>
</div>

<footer>Коко Код Академия · прогресът се пази автоматично на това устройство 💾</footer>

<script src="js/core.js"></script>
<script src="js/track-a.js"></script>
<script src="js/track-b.js"></script>
</body>
</html>
